name: Build AI Supreme Kali ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Remastering Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso squashfs-tools isolinux curl aria2

      - name: Run Build Script
        run: |
          sed -i 's/\r$//' build_iso_cloud.sh
          chmod +x build_iso_cloud.sh
          ./build_iso_cloud.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-ai-supreme
          name: AI Supreme Kali Live USB
          body: "Autonomous AI Supreme Integration Complete. Includes Gemini-CLI, Antigravity-CLI, HexStrike-AI, LM Studio, Ollama/Gemma."
          files: kali-linux-2026.1-ai-supreme.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
