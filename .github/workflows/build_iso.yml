name: Build AI Supreme Kali ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Remastering Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso squashfs-tools isolinux curl aria2 dos2unix

      - name: Prepare Build Environment
        run: |
          # Convert line endings to Unix format
          dos2unix build_iso.sh lib/*.sh
          chmod +x build_iso.sh

      - name: Run Build Script
        env:
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
        run: |
          # Write secret to a local file
          echo "$ADMIN_PASS" > .admin_secret
          chmod 600 .admin_secret
          
          # Generate config file for paths (no secret here)
          echo "ISO_PATH=kali-linux-2026.1-live-amd64.iso" > .env
          echo "OUTPUT_ISO=kali-linux-2026.1-spartanai.iso" >> .env
          
          chmod +x build_spartan.sh
          # Run with sudo, passing the secret file as an argument
          sudo ./build_spartan.sh .admin_secret


      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-ai-supreme
          name: AI Supreme Kali Live USB
          body: "Autonomous AI Supreme Integration Complete. Includes Gemini-CLI, Antigravity-CLI, HexStrike-AI, LM Studio, Ollama/Gemma."
          files: kali-linux-2026.1-ai-supreme.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
